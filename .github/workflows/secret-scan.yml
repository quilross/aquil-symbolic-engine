name: Secret Scan

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Fetch full history for comprehensive scanning
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run secret scan
        run: npm run secret-scan

      - name: Comment PR if secrets found
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const comment = `🚨 **Secret Scan Failed**
            
            The secret scanning check has detected potential secrets in this PR. 
            
            **Next Steps:**
            1. Review the failed job logs above for details
            2. Remove any hardcoded secrets, API keys, or tokens
            3. Use environment variables or GitHub secrets instead
            4. If these are false positives, add them to the whitelist in \`scripts/secret-scan.cjs\`
            
            **Common Issues:**
            - Hardcoded API tokens (\`sq_live_*\`, \`sq_admin_*\`)
            - AWS keys or other cloud credentials  
            - JWT tokens or bearer tokens
            - Database passwords or connection strings
            
            Please fix these issues and push new commits to re-run the check.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });