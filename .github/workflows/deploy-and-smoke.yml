name: Deploy and Smoke Test

on:
  workflow_dispatch:

jobs:
  deploy-and-smoke:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: wrangler deploy

      - name: Set base URL for smoke tests
        run: |
          export BASE_URL=https://signal_q.catnip-pieces1.workers.dev
          echo "BASE_URL=$BASE_URL" >> $GITHUB_ENV

      - name: Smoke test - Version endpoint
        run: |
          curl -sSf "$BASE_URL/version" | jq .

      - name: Smoke test - Health endpoint (with retry)
        env:
          SIGNALQ_API_TOKEN_PROD: ${{ secrets.SIGNALQ_API_TOKEN_PROD }}
        run: |
          # Function to test health endpoint
          test_health() {
            curl -sSf -X POST -H "Authorization: Bearer $SIGNALQ_API_TOKEN_PROD" "$BASE_URL/actions/system_health" | tee health.json | jq .
            # Check if status is "healthy"
            STATUS=$(jq -r '.status' health.json)
            if [ "$STATUS" != "healthy" ]; then
              echo "❌ Health check failed - status is '$STATUS' (expected 'healthy')"
              return 1
            fi
            echo "✅ Health endpoint OK (status: $STATUS)"
            return 0
          }
          
          # Try the health check, retry once on network error
          if ! test_health; then
            echo "Retrying health check in 5 seconds..."
            sleep 5
            test_health
          fi