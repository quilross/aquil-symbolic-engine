name: Deploy and Smoke Test

on:
  workflow_dispatch:

jobs:
  deploy-and-smoke:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: wrangler deploy

      - name: Set base URL for smoke tests
        run: |
          # Use custom domain if available, fallback to workers.dev
          export PRIMARY_URL=https://signal-q.example.com
          export FALLBACK_URL=https://signal_q.catnip-pieces1.workers.dev
          echo "PRIMARY_URL=$PRIMARY_URL" >> $GITHUB_ENV
          echo "FALLBACK_URL=$FALLBACK_URL" >> $GITHUB_ENV

      - name: Smoke test - Version endpoint (Primary)
        run: |
          # Test version endpoint with jq assertions and retry
          test_version() {
            curl -sSf "$PRIMARY_URL/version" | tee v-primary.json | jq -e '.version and .gitSha and .buildTime and .environment'
          }
          
          # Try version check, retry once on network error
          if ! test_version; then
            echo "Primary domain failed, testing fallback in 5 seconds..."
            sleep 5
            curl -sSf "$FALLBACK_URL/version" | tee v-fallback.json | jq -e '.version and .gitSha and .buildTime and .environment'
          fi

      - name: Smoke test - Health endpoint (with retry)
        env:
          SIGNALQ_API_TOKEN_PROD: ${{ secrets.SIGNALQ_API_TOKEN_PROD }}
        run: |
          # Function to test health endpoint
          test_health() {
            local url=$1
            curl -sSf -X POST -H "Authorization: Bearer $SIGNALQ_API_TOKEN_PROD" "$url/actions/system_health" | tee h-$(basename $url).json | jq -e '.status=="healthy"'
          }
          
          # Try the health check on primary domain, fallback if needed
          if ! test_health "$PRIMARY_URL"; then
            echo "Primary domain health check failed, trying fallback in 5 seconds..."
            sleep 5
            test_health "$FALLBACK_URL"
          fi

      - name: Run contract tests
        env:
          SIGNALQ_API_TOKEN: ${{ secrets.SIGNALQ_API_TOKEN_PROD }}
        run: |
          node scripts/test-contract.js