name: Uptime Monitor

on:
  schedule:
    - cron: '*/10 * * * *'  # Every 10 minutes
  workflow_dispatch:

permissions:
  issues: write
  
jobs:
  uptime-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run domain validation script
        env:
          CUSTOM_DOMAIN: signal-q.example.com
          SIGNALQ_API_TOKEN: ${{ secrets.SIGNALQ_API_TOKEN_PROD }}
        run: |
          node scripts/domain-validation.cjs | tee uptime-results.log

      - name: Parse results and check status
        run: |
          # Extract final status from log
          if grep -q "✅ OPERATIONAL" uptime-results.log; then
            echo "STATUS=operational" >> $GITHUB_ENV
            echo "✅ All systems operational"
          elif grep -q "🔄.*operational" uptime-results.log; then
            echo "STATUS=fallback" >> $GITHUB_ENV
            echo "⚠️ Operating on fallback domain"
          else
            echo "STATUS=down" >> $GITHUB_ENV
            echo "❌ Systems experiencing issues"
            exit 1
          fi

      - name: Create or update uptime issue on failure
        if: failure()
        uses: actions/github-script@v7
        env:
          SIGNALQ_API_TOKEN_PROD: ${{ secrets.SIGNALQ_API_TOKEN_PROD }}
        with:
          script: |
            const fs = require('fs');
            const timestamp = new Date().toISOString();
            const title = 'Uptime Log';
            
            // Read uptime results
            let logContent = 'Validation log not available';
            try {
              if (fs.existsSync('uptime-results.log')) {
                logContent = fs.readFileSync('uptime-results.log', 'utf8');
              }
            } catch (e) {
              console.error('Error reading uptime results:', e);
            }
            
            const entry = `🔴 **Multi-domain uptime check failed** - ${timestamp}
            
            **Custom Domain**: signal-q.example.com
            **Fallback Domain**: signal_q.catnip-pieces1.workers.dev
            
            **Validation Results:**
            \`\`\`
            ${logContent.slice(-2000)}  // Last 2000 chars
            \`\`\`
            
            ---
            
            `;
            
            // Look for existing uptime issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['uptime']
            });
            
            const existingIssue = issues.find(issue => issue.title === title);
            
            if (existingIssue) {
              // Append to existing issue
              const currentBody = existingIssue.body || '';
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: entry + currentBody
              });
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: entry,
                labels: ['uptime', 'monitoring', 'multi-domain']
              });
            }