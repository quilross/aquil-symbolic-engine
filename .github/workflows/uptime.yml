name: Uptime Monitor

on:
  schedule:
    - cron: '*/10 * * * *'  # Every 10 minutes
  workflow_dispatch:

jobs:
  uptime-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Set base URL
        run: |
          export BASE_URL=https://signal_q.catnip-pieces1.workers.dev
          echo "BASE_URL=$BASE_URL" >> $GITHUB_ENV

      - name: Check version endpoint
        run: |
          curl -s "$BASE_URL/version" | jq -e .version

      - name: Check health endpoint
        env:
          SIGNALQ_API_TOKEN_PROD: ${{ secrets.SIGNALQ_API_TOKEN_PROD }}
        run: |
          curl -s -X POST -H "Authorization: Bearer $SIGNALQ_API_TOKEN_PROD" "$BASE_URL/actions/system_health" | jq -e '.status=="healthy"'

      - name: Create or update uptime issue on failure
        if: failure()
        uses: actions/github-script@v7
        env:
          SIGNALQ_API_TOKEN_PROD: ${{ secrets.SIGNALQ_API_TOKEN_PROD }}
        with:
          script: |
            const timestamp = new Date().toISOString();
            const title = 'Uptime Log';
            
            // Try to get the last response body for debugging
            let lastResponse = 'Response body not available';
            try {
              // This would contain the actual response if we captured it
              lastResponse = 'Check failed at ' + timestamp;
            } catch (e) {
              // Fallback if no response captured
            }
            
            const entry = `🔴 **Uptime check failed** - ${timestamp}\n\nLast response: ${lastResponse}\n\n---\n\n`;
            
            // Look for existing uptime issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['uptime']
            });
            
            const existingIssue = issues.find(issue => issue.title === title);
            
            if (existingIssue) {
              // Append to existing issue
              const currentBody = existingIssue.body || '';
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: entry + currentBody
              });
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: entry,
                labels: ['uptime', 'monitoring']
              });
            }