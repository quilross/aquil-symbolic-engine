name: Uptime Monitor

on:
  schedule:
    - cron: '*/10 * * * *'  # Every 10 minutes
  workflow_dispatch:

permissions:
  issues: write
  
jobs:
  uptime-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Set base URL
        run: |
          export BASE_URL=https://signal_q.catnip-pieces1.workers.dev
          echo "BASE_URL=$BASE_URL" >> $GITHUB_ENV

      - name: Check version endpoint
        run: |
          echo "📦 Checking /version endpoint..."
          curl -sSf "$BASE_URL/version" | tee v.json | jq -e '.version and .gitSha and .buildTime and .environment'

      - name: Check health endpoint with detailed error capture
        env:
          SIGNALQ_API_TOKEN_PROD: ${{ secrets.SIGNALQ_API_TOKEN_PROD }}
        run: |
          echo "🏥 Checking /actions/system_health endpoint..."
          # First attempt
          if curl -s -D headers.txt -X POST -H "Authorization: Bearer $SIGNALQ_API_TOKEN_PROD" "$BASE_URL/actions/system_health" | tee body.json | jq -e '.status=="healthy"' 2>/dev/null; then
            echo "✅ Health check passed"
          else
            echo "⚠️ First attempt failed, retrying after 5 seconds..."
            sleep 5
            # Second attempt
            if curl -s -D headers.txt -X POST -H "Authorization: Bearer $SIGNALQ_API_TOKEN_PROD" "$BASE_URL/actions/system_health" | tee body.json | jq -e '.status=="healthy"' 2>/dev/null; then
              echo "✅ Health check passed on retry"
            else
              echo "❌ Health check failed after retry"
              exit 1
            fi
          fi

      - name: Create or update uptime issue on failure
        if: failure()
        uses: actions/github-script@v7
        env:
          SIGNALQ_API_TOKEN_PROD: ${{ secrets.SIGNALQ_API_TOKEN_PROD }}
        with:
          script: |
            const fs = require('fs');
            const timestamp = new Date().toISOString();
            const title = 'Uptime Log';
            
            // Extract correlation ID from headers if available
            let correlationId = 'none';
            let httpStatus = 'N/A';
            let bodyExcerpt = 'Response body not available';
            let versionInfo = 'N/A';
            
            try {
              // Get correlation ID from response headers
              if (fs.existsSync('headers.txt')) {
                const headers = fs.readFileSync('headers.txt', 'utf8');
                const correlationMatch = headers.match(/X-Correlation-ID:\s*(.+)/i);
                if (correlationMatch) {
                  correlationId = correlationMatch[1].trim();
                }
                const statusMatch = headers.match(/HTTP\/\d\.\d\s+(\d+)/);
                if (statusMatch) {
                  httpStatus = statusMatch[1];
                }
              }
              
              // Get response body excerpt (truncated to 200 chars)
              if (fs.existsSync('body.json')) {
                const body = fs.readFileSync('body.json', 'utf8');
                bodyExcerpt = body.length > 200 ? body.substring(0, 200) + '...' : body;
              }
              
              // Get version info from successful version call
              if (fs.existsSync('v.json')) {
                const versionData = JSON.parse(fs.readFileSync('v.json', 'utf8'));
                versionInfo = `${versionData.version || 'unknown'} (${versionData.gitSha || 'unknown'})`;
              }
            } catch (e) {
              console.error('Error reading response files:', e);
            }
            
            const entry = `🔴 **Uptime check failed** - ${timestamp}
            - **Endpoint**: POST /actions/system_health
            - **HTTP Status**: ${httpStatus}
            - **Correlation ID**: ${correlationId}
            - **Version**: ${versionInfo}
            - **Response Excerpt**: \`${bodyExcerpt}\`
            
            ---
            
            `;
            
            // Look for existing uptime issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['uptime']
            });
            
            const existingIssue = issues.find(issue => issue.title === title);
            
            if (existingIssue) {
              // Append to existing issue
              const currentBody = existingIssue.body || '';
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: entry + currentBody
              });
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: entry,
                labels: ['uptime', 'monitoring']
              });
            }