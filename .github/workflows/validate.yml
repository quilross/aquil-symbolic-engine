name: Validate API (Preview + Production Matrix)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate OpenAPI YAML specification (canonical)
        run: npx swagger-cli validate worker/openapi-core.yaml

      - name: Validate worker syntax
        run: npm run build

  validate-matrix:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        env: [preview, production]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Wrangler authentication
        run: |
          echo "${{ secrets.CLOUDFLARE_API_TOKEN }}" | wrangler auth login --api-token
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy and set BASE_URL
        id: deploy
        run: |
          cd worker
          if [ "${{ matrix.env }}" = "preview" ]; then
            echo "🚀 Deploying to preview..."
            wrangler deploy --dry-run=false
            # Extract preview URL from output and set BASE_URL
            BASE_URL="https://signal_q.catnip-pieces1.workers.dev"
          else
            echo "🚀 Deploying to production..."
            wrangler deploy --env production
            BASE_URL="https://signal_q.catnip-pieces1.workers.dev"
          fi
          echo "BASE_URL=$BASE_URL" >> $GITHUB_ENV
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Wait for deployment
        run: |
          echo "⏳ Waiting 30 seconds for deployment to be ready..."
          sleep 30

      - name: Test version endpoint
        run: |
          echo "📦 Testing /version endpoint..."
          for attempt in 1 2; do
            if curl -sSf "$BASE_URL/version" | tee v.json | jq -e '.version and .gitSha and .buildTime and .environment'; then
              echo "✅ Version endpoint test passed"
              break
            else
              if [ $attempt -eq 1 ]; then
                echo "⚠️ First attempt failed, retrying..."
                sleep 5
              else
                echo "❌ Version endpoint test failed after retry"
                exit 1
              fi
            fi
          done

      - name: Test system health endpoint
        run: |
          echo "🏥 Testing /system/health endpoint..."
          for attempt in 1 2; do
            if curl -sSf "$BASE_URL/system/health" | tee h.json | jq -e '.status=="ok" and .timestamp and .name and .version'; then
              echo "✅ System health test passed"
              break
            else
              if [ $attempt -eq 1 ]; then
                echo "⚠️ First attempt failed, retrying..."
                sleep 5
              else
                echo "❌ System health test failed after retry"
                exit 1
              fi
            fi
          done

      - name: Test actions list endpoint
        run: |
          echo "📋 Testing /actions/list endpoint..."
          for attempt in 1 2; do
            if curl -sSf -X POST -H "Authorization: Bearer ${{ secrets.SIGNALQ_API_TOKEN_PROD }}" "$BASE_URL/actions/list" | jq -e '.actions and (.actions|index("list")!=null) and (.actions|index("deploy")!=null) and (.actions|index("probe_identity")!=null)'; then
              echo "✅ Actions list test passed"
              break
            else
              if [ $attempt -eq 1 ]; then
                echo "⚠️ First attempt failed, retrying..."
                sleep 5
              else
                echo "❌ Actions list test failed after retry"
                exit 1
              fi
            fi
          done

      - name: Test probe identity endpoint
        run: |
          echo "🔍 Testing /actions/probe_identity endpoint..."
          for attempt in 1 2; do
            if curl -sSf -X POST -H "Authorization: Bearer ${{ secrets.SIGNALQ_API_TOKEN_PROD }}" "$BASE_URL/actions/probe_identity" -H "Content-Type: application/json" -d '{}' | jq -e '.analysis and (.analysis.stability|type=="number") and (.analysis.coherence|type=="string") and (.analysis.authenticity|type=="number") and (.analysis.recommendation|type=="string")'; then
              echo "✅ Probe identity test passed"
              break
            else
              if [ $attempt -eq 1 ]; then
                echo "⚠️ First attempt failed, retrying..."
                sleep 5
              else
                echo "❌ Probe identity test failed after retry"
                exit 1
              fi
            fi
          done

      - name: Test recalibrate state endpoint
        run: |
          echo "🔄 Testing /actions/recalibrate_state endpoint..."
          for attempt in 1 2; do
            if curl -sSf -X POST -H "Authorization: Bearer ${{ secrets.SIGNALQ_API_TOKEN_PROD }}" "$BASE_URL/actions/recalibrate_state" -H "Content-Type: application/json" -d '{}' | jq -e '.state=="recalibrated" and .identity_key and .dominant_emotion and .timestamp'; then
              echo "✅ Recalibrate state test passed"
              break
            else
              if [ $attempt -eq 1 ]; then
                echo "⚠️ First attempt failed, retrying..."
                sleep 5
              else
                echo "❌ Recalibrate state test failed after retry"
                exit 1
              fi
            fi
          done

      - name: Test deploy endpoint
        run: |
          echo "🚀 Testing /actions/deploy endpoint..."
          for attempt in 1 2; do
            if curl -sSf -X POST -H "Authorization: Bearer ${{ secrets.SIGNALQ_API_TOKEN_PROD }}" "$BASE_URL/actions/deploy" | jq -e '.deployment=="triggered" and .timestamp'; then
              echo "✅ Deploy action test passed"
              break
            else
              if [ $attempt -eq 1 ]; then
                echo "⚠️ First attempt failed, retrying..."
                sleep 5
              else
                echo "❌ Deploy action test failed after retry"
                exit 1
              fi
            fi
          done