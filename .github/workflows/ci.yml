name: signal_q
permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '20.0.0'

      - name: Install dependencies
        run: npm ci

      - name: Run security scan
        run: npm run secret-scan

      - name: Run dependency audit
        run: npm audit --audit-level moderate

      - name: Validate worker syntax
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Start development server for contract tests
        run: |
          npm run dev &
          DEV_PID=$!
          echo "DEV_PID=$DEV_PID" >> $GITHUB_ENV
          
          # Wait for server to start
          for i in {1..30}; do
            if curl -f http://localhost:8787/version >/dev/null 2>&1; then
              echo "✅ Development server started"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Development server failed to start"
              exit 1
            fi
            sleep 2
          done

      - name: Run contract tests
        env:
          BASE_URL: http://localhost:8787
          API_TOKEN: dev-placeholder
        run: node scripts/test-contract.js

      - name: Stop development server
        if: always()
        run: |
          if [ ! -z "$DEV_PID" ]; then
            kill $DEV_PID || true
          fi

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '20.0.0'

      - name: Install dependencies
        run: npm ci

      - name: Set build information
        run: |
          echo "GIT_SHA=${{ github.sha }}" >> $GITHUB_ENV
          echo "BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%S.%3NZ')" >> $GITHUB_ENV

      - name: Deploy to staging
        run: |
          cd worker
          echo "${{ secrets.CLOUDFLARE_API_TOKEN }}" | wrangler auth login --api-token
          wrangler secret put GIT_SHA --env staging <<< "${{ env.GIT_SHA }}"
          wrangler secret put BUILD_TIME --env staging <<< "${{ env.BUILD_TIME }}"
          wrangler secret put NODE_ENV --env staging <<< "staging"
          wrangler deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Wait for staging deployment
        run: sleep 30

      - name: Staging smoke test
        run: |
          STAGING_URL="https://signal_q_staging.catnip-pieces1.workers.dev"
          TOKEN="${{ secrets.API_TOKEN_STAGING || 'dev-placeholder' }}"
          
          echo "🧪 Testing staging deployment..."
          
          # Test version endpoint (public)
          echo "📦 Version check:"
          curl -f "$STAGING_URL/version" | jq .
          
          # Test health endpoint (canonical /system/health)
          echo "🏥 Health check:"
          curl -f -H "Authorization: Bearer $TOKEN" "$STAGING_URL/system/health" | jq .
          
          # Test probe identity
          echo "🔍 Identity probe:"
          curl -f -X POST -H "Authorization: Bearer $TOKEN" "$STAGING_URL/actions/probe_identity" | jq .
          
          echo "✅ Staging smoke test passed"

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '20.0.0'

      - name: Install dependencies
        run: npm ci

      - name: Set build information
        run: |
          echo "GIT_SHA=${{ github.sha }}" >> $GITHUB_ENV
          echo "BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%S.%3NZ')" >> $GITHUB_ENV

      - name: Deploy to production
        run: |
          cd worker
          echo "${{ secrets.CLOUDFLARE_API_TOKEN }}" | wrangler auth login --api-token
          wrangler secret put GIT_SHA --env production <<< "${{ env.GIT_SHA }}"
          wrangler secret put BUILD_TIME --env production <<< "${{ env.BUILD_TIME }}"
          wrangler secret put NODE_ENV --env production <<< "production"
          wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Wait for production deployment
        run: sleep 30

      - name: Production smoke test
        run: |
          PROD_URL="https://signal_q.catnip-pieces1.workers.dev"
          TOKEN="${{ secrets.API_TOKEN_PROD || 'dev-placeholder' }}"
          
          echo "🚀 Testing production deployment..."
          
          # Test version endpoint (public)
          echo "📦 Version check:"
          VERSION_RESPONSE=$(curl -f "$PROD_URL/version")
          echo "$VERSION_RESPONSE" | jq .
          
          # Verify git SHA matches
          DEPLOYED_SHA=$(echo "$VERSION_RESPONSE" | jq -r .gitSha)
          if [ "$DEPLOYED_SHA" != "${{ github.sha }}" ]; then
            echo "❌ Git SHA mismatch: expected ${{ github.sha }}, got $DEPLOYED_SHA"
            exit 1
          fi
          
          # Test health endpoint (canonical /system/health)
          echo "🏥 Health check:"
          curl -f -H "Authorization: Bearer $TOKEN" "$PROD_URL/system/health" | jq .
          
          # Test probe identity
          echo "🔍 Identity probe:"
          curl -f -X POST -H "Authorization: Bearer $TOKEN" "$PROD_URL/actions/probe_identity" | jq .
          
          echo "✅ Production smoke test passed"

      - name: Create deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | Status | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|--------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Staging | ✅ Deployed | https://signal_q_staging.catnip-pieces1.workers.dev |" >> $GITHUB_STEP_SUMMARY
          echo "| Production | ✅ Deployed | https://signal_q.catnip-pieces1.workers.dev |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Git SHA:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Build Time:** \`$(date -u +'%Y-%m-%dT%H:%M:%S.%3NZ')\`" >> $GITHUB_STEP_SUMMARY

  codespaces-compatibility:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        
      - name: Validate devcontainer configuration
        run: |
          echo "🔍 Checking devcontainer configuration..."
          
          # Check if devcontainer.json exists and is valid JSON
          if [ ! -f ".devcontainer/devcontainer.json" ]; then
            echo "❌ devcontainer.json not found"
            exit 1
          fi
          
          # Validate JSON syntax
          cat .devcontainer/devcontainer.json | python3 -m json.tool > /dev/null
          echo "✅ devcontainer.json is valid JSON"
          
          # Check for required port forwarding
          if grep -q '"forwardPorts"' .devcontainer/devcontainer.json; then
            echo "✅ Port forwarding configuration found"
          else
            echo "❌ Port forwarding configuration missing"
            exit 1
          fi
          
          # Check for Codespaces environment detection in test runner
          if grep -q "CODESPACES" test-runner.sh; then
            echo "✅ Codespaces environment detection found in test-runner.sh"
          else
            echo "❌ Codespaces environment detection missing in test-runner.sh"
            exit 1
          fi
          
          echo "🎉 Codespaces compatibility checks passed!"
