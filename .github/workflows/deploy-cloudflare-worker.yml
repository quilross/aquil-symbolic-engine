name: Deploy and Validate Signal Q Worker

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy-and-validate:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Authenticate Wrangler
        run: wrangler whoami
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy Cloudflare Worker
        run: |
          cd worker
          wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Wait for deployment to propagate
        run: sleep 30

      - name: Run health validation
        run: |
          cd worker
          node health-test.js | tee health-test-results.log

      - name: Run OpenAPI audit
        run: |
          cd worker
          node openapi-audit.js | tee openapi-audit-results.log

      - name: Run implementation analysis
        run: |
          cd worker
          node implementation-analysis.js | tee implementation-analysis-results.log

      - name: Run final comprehensive audit
        run: |
          cd worker
          node final-audit.js | tee final-audit-results.log

      - name: Upload audit reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: signal-q-audit-reports-${{ github.run_number }}
          path: |
            worker/health-test-results.log
            worker/openapi-audit-results.log
            worker/implementation-analysis-results.log
            worker/final-audit-results.log
            worker/alignment-report.json
            worker/audit-results.json
            worker/implementation-analysis.json
            worker/final-audit-report.json
          retention-days: 30

      - name: Check deployment success
        run: |
          cd worker
          echo "🎯 Verifying CustomGPT integration readiness..."
          echo "Base URL: https://signal_q.catnip-pieces1.workers.dev"
          echo "Bearer Token: sq_live_7k9m2n8p4x6w1z5q3r7t9v2b4c6d8f0h"
          echo "OpenAPI Schema: worker/src/openapi-core.json"
          
          # Quick health check using curl
          echo "🔍 Testing health endpoint..."
          if curl -s -f \
            -H "Authorization: Bearer sq_live_7k9m2n8p4x6w1z5q3r7t9v2b4c6d8f0h" \
            -H "Content-Type: application/json" \
            https://signal_q.catnip-pieces1.workers.dev/system/health > /dev/null 2>&1; then
            echo "🎉 Signal Q deployment successful and ready for CustomGPT!"
          else
            echo "❌ Deployment verification failed"
            exit 1
          fi