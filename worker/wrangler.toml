name = "signal_q"
main = "src/index.js"
compatibility_date = "2024-11-01"
# account_id is set via environment variable CLOUDFLARE_ACCOUNT_ID

# Build configuration
[build]
command = ""

[[kv_namespaces]]
binding = "SIGNAL_KV"
id = "cb01f3bf664a4feb9a3ec29fd86cd43e"  # This will be overridden by --binding flag in CI
preview_id = "cb01f3bf664a4feb9a3ec29fd86cd43e"

[[durable_objects.bindings]]
name = "USER_STATE"
class_name = "UserState"

# Durable Objects migrations (required for free plan)
[[migrations]]
tag = "v1"
new_sqlite_classes = ["UserState"]

# AI binding for enhanced agent capabilities
[ai]
binding = "AI"

# Environment variables
# These will be overridden by --var flags in CI deployment
[vars]
API_TOKEN = "development_token_replace_in_production"
API_TOKEN_ADMIN = "development_admin_token_replace_in_production"
