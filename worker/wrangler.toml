name = "signal-q"
main = "index.js"
compatibility_date = "2025-08-01"
routes = []
account_id = "b07412f2f2389e8b537051bc092f3376"

[observability]
enabled = true

[[kv_namespaces]]
binding = "SIGNAL_KV"
id = "cb01f3bf664a4feb9a3ec29fd86cd43e"

[[durable_objects.bindings]]
name = "USER_STATE"
class_name = "UserState"

[[durable_objects.bindings]]
name = "MEMORY"
class_name = "MemoryDO"

[[migrations]]
tag = "v1"
new_classes = ["UserState"]

[[migrations]]
tag = "v2"
new_classes = ["MemoryDO"]

[ai]
binding = "AI"

[observability.logs]
enabled = true

[vars]
APP_VERSION = "v6.1"
WORKER_NAME = "signal-q"
USER_TOKEN = "dev-placeholder"
ADMIN_TOKEN = "dev-placeholder"

[env.production]
name = "signal-q-prod"
vars = { NODE_ENV = "production" }

[env.production.kv_namespaces]
binding = "SIGNAL_KV"
id = "cb01f3bf664a4feb9a3ec29fd86cd43e"

[[env.production.durable_objects.bindings]]
name = "USER_STATE"
class_name = "UserState"

[[env.production.durable_objects.bindings]]
name = "MEMORY"
class_name = "MemoryDO"

[env.production.ai]
binding = "AI"

[env.production.observability.logs]
enabled = true


