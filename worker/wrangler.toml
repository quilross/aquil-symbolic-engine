name = "signalhaven-worker"
main = "index.ts"
compatibility_date = "2024-08-01"

[vars]
AUTH_DISABLED = "true"
ADMIN_TOKENS = "signalhaven-demo-token"
BASE_URL = "http://127.0.0.1:8787"
CORS_ORIGIN = "*"

[durable_objects]
bindings = [
  { name = "MEMORY_DO", class_name = "MemoryDO" }
]

[[migrations]]
tag = "v1"
new_classes = ["MemoryDO"]
