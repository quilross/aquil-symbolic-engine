name = "signal_q"
main = "worker/index.js"
compatibility_date = "2024-12-01"
workers_dev = false

routes = [
  { pattern = "signal-q.me", custom_domain = true }
]

[vars]
FALLBACK_APP_VERSION = "v6.1"

[durable_objects]
bindings = [
  { name = "MEMORY", class_name = "MemoryDO" }
]

[[migrations]]
tag = "v1-memory"
new_classes = ["MemoryDO"]

[env.production]
[env.production.durable_objects]
bindings = [
  { name = "MEMORY", class_name = "MemoryDO" }
]

