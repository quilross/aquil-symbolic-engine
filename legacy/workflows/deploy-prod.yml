# DEPRECATED: Quarantined Aug 2025. Superseded by Gene Keys kernel path. Do not import in active runtime.
name: Production Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
  push:
    tags:
      - 'v*'

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Set build metadata
        run: |
          echo "GIT_SHA=${{ github.sha }}" >> $GITHUB_ENV
          echo "BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%S.%3NZ')" >> $GITHUB_ENV
          echo "NODE_ENV=production" >> $GITHUB_ENV

      - name: Deploy to production
        run: |
          cd worker
          echo "${{ secrets.CLOUDFLARE_API_TOKEN }}" | wrangler auth login --api-token
          wrangler secret put GIT_SHA --env production <<< "${{ env.GIT_SHA }}"
          wrangler secret put BUILD_TIME --env production <<< "${{ env.BUILD_TIME }}"
          wrangler secret put NODE_ENV --env production <<< "${{ env.NODE_ENV }}"
          wrangler secret put SIGNALQ_API_TOKEN --env production <<< "${{ secrets.SIGNALQ_API_TOKEN_PROD }}"
          wrangler secret put SIGNALQ_ADMIN_TOKEN --env production <<< "${{ secrets.SIGNALQ_ADMIN_TOKEN_PROD }}"
          wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Wait for deployment
        run: sleep 30

      - name: Smoke test - Version endpoint
        run: |
          PROD_URL="https://signal-q-prod.catnip-pieces1.workers.dev"
          echo "🔍 Testing /version endpoint..."
          
          VERSION_RESPONSE=$(curl -f "$PROD_URL/version")
          echo "$VERSION_RESPONSE" | jq .
          
          # Verify build metadata
          DEPLOYED_SHA=$(echo "$VERSION_RESPONSE" | jq -r .gitSha)
          DEPLOYED_ENV=$(echo "$VERSION_RESPONSE" | jq -r .environment)
          
          if [ "$DEPLOYED_SHA" != "${{ github.sha }}" ]; then
            echo "❌ Git SHA mismatch: expected ${{ github.sha }}, got $DEPLOYED_SHA"
            exit 1
          fi
          
          if [ "$DEPLOYED_ENV" != "production" ]; then
            echo "❌ Environment mismatch: expected production, got $DEPLOYED_ENV"
            exit 1
          fi
          
          echo "✅ Version endpoint validated"

      - name: Smoke test - Health endpoint
        run: |
          PROD_URL="https://signal-q-prod.catnip-pieces1.workers.dev"
          TOKEN="${{ secrets.SIGNALQ_API_TOKEN_PROD }}"
          
          echo "🏥 Testing /system/health endpoint..."
          
          HEALTH_RESPONSE=$(curl -f -H "Authorization: Bearer $TOKEN" "$PROD_URL/system/health")
          echo "$HEALTH_RESPONSE" | jq .
          
          # Verify health status
          OVERALL_STATUS=$(echo "$HEALTH_RESPONSE" | jq -r .overall)
          
          if [ "$OVERALL_STATUS" != "healthy" ]; then
            echo "❌ Health check failed: overall status is '$OVERALL_STATUS' (expected 'healthy')"
            echo "Full response: $HEALTH_RESPONSE"
            exit 1
          fi
          
          echo "✅ Health endpoint validated"

      - name: Create deployment summary
        run: |
          echo "## 🚀 Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | Production |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://signal-q-prod.catnip-pieces1.workers.dev |" >> $GITHUB_STEP_SUMMARY
          echo "| Git SHA | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Time | \`${{ env.BUILD_TIME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ✅ Deployed & Verified |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Smoke Test Results" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Version endpoint responding" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Health endpoint responding" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Build metadata verified" >> $GITHUB_STEP_SUMMARY