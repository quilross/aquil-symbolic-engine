# DEPRECATED: Quarantined Aug 2025. Superseded by Gene Keys kernel path. Do not import in active runtime.
name: Repo Autofix (Signalhaven)

on:
  workflow_dispatch:
    inputs:
      custom_hostname:
        description: "Custom domain to bind (e.g., signal-q.me)"
        required: true
        default: "signal-q.me"
      worker_name:
        description: "Worker name in Cloudflare"
        required: true
        default: "signal-q"
      app_version:
        description: "APP_VERSION"
        required: true
        default: "v6.1"

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write worker/src/index.js
        run: |
          mkdir -p worker/src
          cat > worker/src/index.js <<'JS'
// INTENT: Normalize routes, public health/version, strict Bearer on /actions/*
export default {
  async fetch(request, env, ctx) {
    try {
      const url = new URL(request.url);
      const method = request.method.toUpperCase();
      const path = url.pathname.toLowerCase();

      // CORS preflight
      if (method === 'OPTIONS') {
        return new Response(null, {
          status: 204,
          headers: {
            'access-control-allow-origin': '*',
            'access-control-allow-methods': 'GET,POST,OPTIONS',
            'access-control-allow-headers': 'authorization, content-type',
            'access-control-max-age': '86400'
          }
        });
      }

      // Guard rotateDay to avoid crash
      if (typeof this.rotateDay !== 'function') this.rotateDay = async () => {};
      await this.rotateDay();

      // Public endpoints (no auth) for GPT Test
      if (path === '/version' && method === 'GET') {
        return new Response(JSON.stringify({
          version: env?.APP_VERSION || 'v0.0.0',
          ts: new Date().toISOString()
        }), {
          status: 200,
          headers: {
            'content-type': 'application/json; charset=utf-8',
            'access-control-allow-origin': '*'
          }
        });
      }

      if (path === '/system/health' && method === 'GET') {
        return new Response(JSON.stringify({
          ok: true,
          name: 'signal-q',
          ts: new Date().toISOString()
        }), {
          status: 200,
          headers: {
            'content-type': 'application/json; charset=utf-8',
            'access-control-allow-origin': '*'
          }
        });
      }

      // Protected actions
      if (path.startsWith('/actions/') && method === 'POST') {
        const h = request.headers.get('authorization') || '';
        const m = /^bearer\s+(.+)$/i.exec(h);
        const token = m ? m[1].trim() : null;

        const valid = [env?.USER_TOKEN, env?.ADMIN_TOKEN].filter(Boolean);
        if (!token || !valid.includes(token)) {
          return new Response(JSON.stringify({ error: 'Unauthorized' }), {
            status: 401,
            headers: {
              'content-type': 'application/json; charset=utf-8',
              'access-control-allow-origin': '*'
            }
          });
        }

        if (typeof this.routeAction === 'function') {
          return await this.routeAction(path, request, env, token);
        }
        // Fallback if no router wired
        return new Response(JSON.stringify({ ok: true, action: path.split('/').pop() }), {
          status: 200,
          headers: {
            'content-type': 'application/json; charset=utf-8',
            'access-control-allow-origin': '*'
          }
        });
      }

      // 404
      return new Response(JSON.stringify({ error: 'Not Found' }), {
        status: 404,
        headers: {
          'content-type': 'application/json; charset=utf-8',
          'access-control-allow-origin': '*'
        }
      });
    } catch (error) {
      return new Response(JSON.stringify({
        error: String(error?.message || error),
        stack: String(error?.stack || '')
      }), {
        status: 500,
        headers: {
          'content-type': 'application/json; charset=utf-8',
          'access-control-allow-origin': '*'
        }
      });
    }
  }
};
JS

      - name: Write worker/src/openapi-core.json
        run: |
          cat > worker/src/openapi-core.json <<'JSON'
{
  "openapi": "3.1.0",
  "info": {
    "title": "Signalhaven Actions API",
    "version": "v6.1",
    "description": "Public health/version; Bearer on /actions/*."
  },
  "servers": [
    { "url": "https://signal_q.catnip-pieces1.workers.dev", "description": "workers.dev" },
    { "url": "https://signal-q.me", "description": "custom domain" }
  ],
  "components": {
    "securitySchemes": {
      "bearerAuth": { "type": "http", "scheme": "bearer", "bearerFormat": "Bearer" }
    },
    "schemas": {
      "GenericResponse": { "type": "object", "additionalProperties": true }
    }
  },
  "paths": {
    "/version": {
      "get": {
        "operationId": "getVersion",
        "summary": "Version (no auth).",
        "responses": {
          "200": { "description": "OK",
            "content": { "application/json": { "schema": { "$ref": "#/components/schemas/GenericResponse" } } } }
        }
      }
    },
    "/system/health": {
      "get": {
        "operationId": "getSystemHealth",
        "summary": "Health (no auth).",
        "responses": {
          "200": { "description": "OK",
            "content": { "application/json": { "schema": { "$ref": "#/components/schemas/GenericResponse" } } } }
        }
      }
    },
    "/actions/list": {
      "post": {
        "operationId": "listActions",
        "summary": "List actions.",
        "security": [{ "bearerAuth": [] }],
        "responses": {
          "200": { "description": "OK",
            "content": { "application/json": { "schema": { "$ref": "#/components/schemas/GenericResponse" } } } },
          "401": { "description": "Unauthorized" }
        }
      }
    },
    "/actions/{actionName}": {
      "post": {
        "operationId": "invokeAction",
        "summary": "Invoke action by name.",
        "security": [{ "bearerAuth": [] }],
        "parameters": [
          { "name": "actionName", "in": "path", "required": true, "schema": { "type": "string" } }
        ],
        "requestBody": {
          "required": false,
          "content": { "application/json": { "schema": { "type": "object", "additionalProperties": true } } }
        },
        "responses": {
          "200": { "description": "OK",
            "content": { "application/json": { "schema": { "$ref": "#/components/schemas/GenericResponse" } } } },
          "401": { "description": "Unauthorized" }
        }
      }
    }
  }
}
JSON

      - name: Write wrangler.toml
        run: |
          HOST="${{ github.event.inputs.custom_hostname }}"
          APP_VERSION="${{ github.event.inputs.app_version }}"
          mkdir -p worker/src
          cat > wrangler.toml <<TOML
name = "${{ github.event.inputs.worker_name }}"
main = "worker/src/index.js"
compatibility_date = "2024-11-11"
workers_dev = true

routes = [
  { pattern = "${HOST}/*" }
]

[vars]
APP_VERSION = "${APP_VERSION}"
TOML

      - name: Write deploy workflow
        run: |
          mkdir -p .github/workflows
          cat > .github/workflows/deploy.yml <<'YML'
name: Deploy Worker
on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "worker/src/**"
      - "wrangler.toml"
      - ".github/workflows/deploy.yml"
permissions:
  contents: read
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy
        env:
          USER_TOKEN: ${{ secrets.USER_TOKEN }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
YML

      - name: Open PR
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "autofix: runtime + openapi + wrangler + deploy workflow"
          title: "autofix: Signalhaven runtime + deploy"
          body: |
            This PR normalizes routing, exposes public health/version, enforces Bearer on /actions/*, aligns OpenAPI servers, binds route, and adds a deploy workflow.

            ## Tests
            ```bash
            curl -s https://${{ github.event.inputs.custom_hostname }}/version
            curl -s https://${{ github.event.inputs.custom_hostname }}/system/health
            curl -s -X POST https://${{ github.event.inputs.custom_hostname }}/actions/list \
              -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" -d '{}'
            ```
          branch: "auto/signalhaven-runtime-deploy"
          labels: autofix