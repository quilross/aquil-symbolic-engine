name = "signal_q"
main = "worker/src/index.js"
compatibility_date = "2024-10-01"

[[kv_namespaces]]
binding = "SIGNAL_KV"
id = "cb01f3bf664a4feb9a3ec29fd86cd43e"

[[durable_objects.bindings]]
name = "USER_STATE"
class_name = "UserState"

[[migrations]]
tag = "v1"
new_classes = ["UserState"]

[ai]
binding = "AI"

[observability.logs]
enabled = true

[vars]
LOG_LEVEL = "info"
GIT_SHA = "local-development"
BUILD_TIME = ""
NODE_ENV = "development"
# Custom domain configuration - falls back to workers.dev if not set
CUSTOM_DOMAIN = ""

[dev]
port = 8787

[env.production]
name = "signal_q_production"
vars = { NODE_ENV = "production", CUSTOM_DOMAIN = "signal-q.example.com" }

[env.staging]
name = "signal_q_staging"  
vars = { NODE_ENV = "staging", CUSTOM_DOMAIN = "signal-q-staging.example.com" }

[env.preview]
name = "signal_q_preview"
vars = { NODE_ENV = "preview", CUSTOM_DOMAIN = "signal-q-preview.example.com" }




